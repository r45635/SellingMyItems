services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sellingmyitems}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-sellingmyitems}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sellingmyitems}"]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      args:
        DATABASE_URL: postgresql://${POSTGRES_USER:-sellingmyitems}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sellingmyitems}
    container_name: sellingmyitems-app
    restart: unless-stopped
    # Port 3000 is only reachable by Caddy via the shared-proxy network.
    # HTTP :5050 is handled by the reverse proxy (301 → HTTPS :5055).
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sellingmyitems}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sellingmyitems}
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-SellingMyItems <onboarding@resend.dev>}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:5050}
      # Storage provider. Unset/"local" (default) → files under public/uploads
      # (persisted via the `uploads` volume). Set STORAGE_PROVIDER=s3 to use an
      # S3/R2 object store, which requires the STORAGE_* vars below.
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-}
      STORAGE_REGION: ${STORAGE_REGION:-}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - shared-proxy

volumes:
  pgdata:
  uploads:
  redisdata:

networks:
  shared-proxy:
    external: true
