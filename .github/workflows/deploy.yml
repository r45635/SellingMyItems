name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 2m
          command_timeout: 40m
          script: |
            set -euo pipefail
            # Global deploy lock on VPS to avoid overlapping runs.
            exec 9>/tmp/sellingmyitems-deploy.lock
            if ! flock -w 1200 9; then
              echo "❌ Could not acquire deploy lock within 20 minutes."
              exit 1
            fi

            export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/id_ed25519_github -o StrictHostKeyChecking=accept-new"
            APP_DIR="${{ secrets.VPS_APP_DIR || '$HOME/sellingmyitems' }}"

            echo "==> Disk space BEFORE deploy:"
            df -h / | tail -1

            AVAIL=$(df / | tail -1 | awk '{print $4}')
            # Keep Docker cache for faster builds unless space is critically low.
            # Builder cache is the big one on a Next.js multi-stage build —
            # easily several GB. Prune in escalating stages: images first
            # (cheap), stopped containers, then the builder cache only when
            # we're still below the headroom we want.
            if [ "$AVAIL" -lt 4194304 ]; then
              echo "==> Low disk space detected (${AVAIL} KB), pruning Docker images..."
              docker image prune -af 2>/dev/null || true
              docker container prune -f 2>/dev/null || true
              AVAIL=$(df / | tail -1 | awk '{print $4}')
              if [ "$AVAIL" -lt 3145728 ]; then
                echo "==> Still low (${AVAIL} KB), pruning Docker builder cache..."
                docker builder prune -af 2>/dev/null || true
                AVAIL=$(df / | tail -1 | awk '{print $4}')
              fi
            fi

            if [ "$AVAIL" -lt 1048576 ]; then
              echo "❌ Less than 1GB free disk space after cleanup (${AVAIL} KB). Aborting deploy."
              echo "==> Top space hogs under /var/lib/docker:"
              du -sh /var/lib/docker/* 2>/dev/null | sort -rh | head -5 || true
              exit 1
            fi

            # Ensure shared-proxy network exists (idempotent, needed for Caddy ↔ App connectivity)
            docker network create shared-proxy 2>/dev/null || true

            # Clone repo on first deploy, then pull
            if [ ! -d "$APP_DIR" ]; then
              echo "==> First deploy: cloning repo..."
              git clone git@github.com:r45635/SellingMyItems.git "$APP_DIR"
              cd "$APP_DIR"
              cp .env.example .env
              echo "⚠  Default .env created — edit POSTGRES_PASSWORD before next deploy!"
            else
              cd "$APP_DIR"
              git pull origin main
            fi

            docker compose config -q
            docker compose build --pull
            docker compose up -d --force-recreate --remove-orphans

            # Wait for db + app to be ready
            echo "==> Waiting for app to be ready..."
            sleep 3

            # Apply any new SQL migrations BEFORE declaring the deploy
            # healthy. Idempotent — first run bootstraps the tracking
            # table from existing files; subsequent runs only apply
            # what's new. See scripts/run-migrations.sh.
            echo "==> Running DB migrations..."
            chmod +x scripts/run-migrations.sh
            ./scripts/run-migrations.sh

            # Verify connectivity AND that the DB schema matches the
            # code we just deployed. /api/health does a SELECT on
            # profiles, so a missing column or enum drift fails this
            # curl with 503 — the previous root-page check would have
            # missed that.
            echo "==> Verifying app + DB schema..."
            if curl -sf http://localhost:5050/api/health -o /dev/null; then
              echo "✅ App + DB healthy"
            else
              echo "❌ App or DB schema unhealthy at /api/health"
              docker compose logs --tail=50 app || true
              exit 1
            fi

            # Post-deploy cleanup: always purge dangling images AND the
            # BuildKit builder cache. Next.js multi-stage builds can leave
            # several GB of cache that accumulate silently between deploys
            # on a small VPS disk. The next build will be ~30s slower but
            # we avoid running out of space mid-build.
            echo "==> Post-deploy prune (dangling images + builder cache)..."
            docker image prune -f 2>/dev/null || true
            docker builder prune -f 2>/dev/null || true

            echo "==> Disk space AFTER deploy:"
            df -h / | tail -1
