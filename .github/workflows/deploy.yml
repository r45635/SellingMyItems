name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 40m
          script: |
            set -euo pipefail
            # Global deploy lock on VPS to avoid overlapping runs.
            exec 9>/tmp/sellingmyitems-deploy.lock
            if ! flock -n 9; then
              echo "❌ Another deployment is already running."
              exit 1
            fi

            export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/id_ed25519_github -o StrictHostKeyChecking=accept-new"
            APP_DIR="${{ secrets.VPS_APP_DIR || '$HOME/sellingmyitems' }}"

            echo "==> Disk space BEFORE deploy:"
            df -h / | tail -1

            AVAIL=$(df / | tail -1 | awk '{print $4}')
            # Keep Docker cache for faster builds unless space is critically low.
            if [ "$AVAIL" -lt 3145728 ]; then
              echo "==> Low disk space detected (${AVAIL} KB), pruning unused Docker images..."
              docker image prune -af 2>/dev/null || true
              AVAIL=$(df / | tail -1 | awk '{print $4}')
            fi

            if [ "$AVAIL" -lt 1048576 ]; then
              echo "❌ Less than 1GB free disk space after cleanup (${AVAIL} KB). Aborting deploy."
              exit 1
            fi

            # Ensure shared-proxy network exists (idempotent, needed for Caddy ↔ App connectivity)
            docker network create shared-proxy 2>/dev/null || true

            # Clone repo on first deploy, then pull
            if [ ! -d "$APP_DIR" ]; then
              echo "==> First deploy: cloning repo..."
              git clone git@github.com:r45635/SellingMyItems.git "$APP_DIR"
              cd "$APP_DIR"
              cp .env.example .env
              echo "⚠  Default .env created — edit POSTGRES_PASSWORD before next deploy!"
            else
              cd "$APP_DIR"
              git pull origin main
            fi

            docker compose config -q
            docker compose build --pull
            docker compose up -d --force-recreate --remove-orphans
            
            # Wait for app to be ready
            echo "==> Waiting for app to be ready..."
            sleep 3

            # Verify connectivity
            echo "==> Verifying app is reachable..."
            if curl -sf http://localhost:5050 -o /dev/null; then
              echo "✅ App healthy"
            else
              echo "❌ App not responding on :5050"
              exit 1
            fi

            # Post-deploy cleanup: remove only dangling images to preserve cache.
            echo "==> Post-deploy prune (dangling only)..."
            docker image prune -f 2>/dev/null || true

            echo "==> Disk space AFTER deploy:"
            df -h / | tail -1
